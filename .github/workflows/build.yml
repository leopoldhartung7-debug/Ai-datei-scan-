name: Build downloadable apps

# Builds ready-to-run SmartFolders apps for Windows, macOS and Linux in the
# cloud (PyInstaller cannot cross-compile, so each OS is built on its own
# runner). Artifacts are downloadable from every run; pushing a version tag
# (e.g. v1.0.0) additionally publishes them as a GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:        # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write           # needed to create the Release on tag builds

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: SmartFolders-Windows.zip
          - os: macos-latest
            asset: SmartFolders-macOS.zip
          - os: ubuntu-latest
            asset: SmartFolders-Linux.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-render-util0

      - name: Install dependencies
        # Lean, reliable bundle: GUI + watcher + OCR/media support. The heavy
        # neural model (sentence-transformers/torch) is intentionally omitted so
        # the download stays small; semantic search uses the built-in fallback.
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 watchdog psutil platformdirs Pillow ImageHash PyMuPDF pytesseract send2trash pyinstaller

      - name: Build the app
        run: python build/build_exe.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/SmartFolders -DestinationPath SmartFolders-Windows.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "dist/SmartFolders.app" SmartFolders-macOS.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf SmartFolders-Linux.tar.gz -C dist SmartFolders

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
