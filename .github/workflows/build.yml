name: Build downloadable apps

# Builds ready-to-run SmartFolders apps for Windows, macOS and Linux in the
# cloud (PyInstaller cannot cross-compile, so each OS is built on its own
# runner) and publishes them as downloadable GitHub Release assets.
#
# Triggers:
#   * push to main (code/workflow changes)  -> refreshes a rolling "latest" build
#   * version tag  v*                        -> publishes a versioned release
#   * manual "Run workflow" button           -> refreshes the "latest" build
#
# Result: the newest installers are always available on the Releases page,
# with zero manual steps.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
            asset: SmartFolders-Windows.zip
          - os: macos-latest
            artifact: macos
            asset: SmartFolders-macOS.zip
          - os: ubuntu-latest
            artifact: linux
            asset: SmartFolders-Linux.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-render-util0

      - name: Install dependencies
        # Lean, reliable bundle: GUI + watcher + OCR/media support. The heavy
        # neural model (sentence-transformers/torch) is intentionally omitted so
        # the download stays small; semantic search uses the built-in fallback.
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 watchdog psutil platformdirs Pillow ImageHash PyMuPDF pytesseract send2trash pyinstaller

      - name: Build the app
        run: python build/build_exe.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/SmartFolders -DestinationPath SmartFolders-Windows.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "dist/SmartFolders.app" SmartFolders-macOS.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf SmartFolders-Linux.tar.gz -C dist SmartFolders

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish downloadable release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "name=Latest build" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release with downloadable apps
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/**/*
